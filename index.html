<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pinewood Derby Map</title>

<style>
:root {
  --bg: #012249;
  --panel: #012249;
  --text: #ffffff;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
}

/* Layout */
.app {
  display: grid;
  grid-template-columns: 1fr 350px;
  height: 100vh;
}

.map-container {
  position: relative;
}

.map-container img {
  width: 100%;
  height: auto;
  display: block;
}

/* Invisible overlay */
.zone {
  fill: transparent;
  stroke: transparent;
  cursor: pointer;
}

/* Optional subtle feedback (can remove if you want ZERO visual change) */
.zone:hover {
  fill: rgba(255,255,255,0.05);
}

.zone.selected {
  fill: rgba(255,255,255,0.1);
}

/* Panel */
.panel {
  background: #012249;
  padding: 20px;
  border-left: 1px solid rgba(255,255,255,0.2);
  overflow-y: auto;
}

.panel h2 {
  margin-top: 0;
  color: #ffffff;
}

/* Controls */
.toolbar {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
}

input, select, button {
  background: #012249;
  color: #ffffff;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 8px;
  margin-right: 5px;
}

input::placeholder {
  color: rgba(255,255,255,0.6);
}

button:hover {
  background: rgba(255,255,255,0.1);
}

/* Text overrides */
p, li, span, dt, dd {
  color: #ffffff;
}
</style>
</head>

<body>

<div class="app">

  <!-- MAP -->
  <div class="map-container">

    <div class="toolbar">
      <input id="search" placeholder="Search..." />
      <select id="jump">
        <option value="">Jump to</option>
      </select>
    </div>

    <img src="A250 Map Online Version.png">

    <svg id="overlay" viewBox="0 0 1544 2000" style="position:absolute;top:0;left:0;width:100%;height:100%"></svg>

  </div>

  <!-- PANEL -->
  <div class="panel">
    <h2 id="title">Select a Booth</h2>
    <div id="content">Click on the map</div>
  </div>

</div>

<script>

// Layout positions (tuned for your image)
const layout = {
  A: { x: 510, y: 550, w: 55, h: 34, rows: 18 },
  B: { x: 680, y: 620, w: 56, h: 34, rows: 16 },
  C: { x: 740, y: 550, w: 56, h: 34, rows: 18 },
  D: { x: 910, y: 550, w: 56, h: 34, rows: 18 }
};

const zones = {};
const svg = document.getElementById("overlay");

// Generate booth grid
function generate(section) {
  let s = layout[section];
  for (let i = 0; i < s.rows; i++) {
    let num = s.rows - i;
    let id = section + num;

    let rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

    rect.setAttribute("x", s.x);
    rect.setAttribute("y", s.y + (i * s.h));
    rect.setAttribute("width", s.w);
    rect.setAttribute("height", s.h);

    rect.classList.add("zone");
    rect.dataset.id = id;

    rect.onclick = () => select(id);

    svg.appendChild(rect);

    zones[id] = {
      title: id,
      desc: "Assign this booth"
    };
  }
}

["A","B","C","D"].forEach(generate);

// Custom data (edit here)
Object.assign(zones, {
  REGISTRATION: {
    title: "Registration",
    desc: "Check-in area"
  },
  VIP: {
    title: "VIP Area",
    desc: "Reserved seating"
  }
});

let selected = null;

function select(id) {

  selected = id;

  document.querySelectorAll(".zone").forEach(z => z.classList.remove("selected"));

  let el = document.querySelector(`[data-id='${id}']`);
  if (el) el.classList.add("selected");

  let data = zones[id] || { title: id, desc: "No data" };

  document.getElementById("title").innerText = data.title;
  document.getElementById("content").innerText = data.desc;

  location.hash = id;
}

// Search
document.getElementById("search").oninput = (e) => {
  let val = e.target.value.toLowerCase();

  Object.keys(zones).forEach(id => {
    let match = id.toLowerCase().includes(val);

    document.querySelectorAll(`[data-id='${id}']`).forEach(el => {
      el.style.pointerEvents = match || !val ? 'auto' : 'none';
      el.style.opacity = match || !val ? 1 : 0;
    });
  });
};

// Jump dropdown
let jump = document.getElementById("jump");

Object.keys(zones).sort().forEach(id => {
  let opt = document.createElement("option");
  opt.value = id;
  opt.textContent = id;
  jump.appendChild(opt);
});

jump.onchange = () => {
  if (jump.value) select(jump.value);
};

// Load hash
if (location.hash) {
  let id = location.hash.replace("#","");
  if (zones[id]) select(id);
}

</script>

</body>
</html>
