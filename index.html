<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>America250 Map</title>

  <style>
    :root {
      --bg: #012249;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);
      --border: rgba(255, 255, 255, 0.22);
      --input-bg: rgba(255, 255, 255, 0.06);
      --modal-bg: #012249;
      --overlay-fill: rgba(255, 255, 255, 0.16);
      --overlay-stroke: rgba(255, 0, 0, 0.85);
      --selected-fill: rgba(255, 255, 255, 0.28);
      --selected-stroke: #ffffff;
      --handle-fill: #ffffff;
      --handle-stroke: #012249;
      --shadow: 0 -12px 26px rgba(0, 0, 0, 0.35);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      background: #012249;
      border-bottom: 1px solid var(--border);
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      padding: 10px 12px;
      outline: none;
    }

    .toolbar input::placeholder {
      color: var(--muted);
    }

    .toolbar input {
      flex: 1 1 220px;
      min-width: 0;
    }

    .toolbar select {
      flex: 1 1 180px;
      min-width: 0;
    }

    .toolbar button {
      flex: 0 0 auto;
      cursor: pointer;
    }

    .toolbar button:hover,
    .toolbar button:focus-visible {
      background: rgba(255, 255, 255, 0.12);
    }

    .map-shell {
      width: 100%;
      padding: 0;
      margin: 0;
      background: #012249;
    }

    .map-wrapper {
      position: relative;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      line-height: 0;
      touch-action: none;
    }

    .map-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .map-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      z-index: 5;
      touch-action: none;
    }

    .zone-group {
      pointer-events: all;
    }

    .zone {
      cursor: pointer;
      vector-effect: non-scaling-stroke;
      pointer-events: all;
    }

    .zone-group.editing .zone {
      cursor: move;
    }

    .zone-group.selected .zone {
      stroke-dasharray: 6 4;
    }

    .resize-handle {
      display: none;
      pointer-events: all;
      cursor: nwse-resize;
      vector-effect: non-scaling-stroke;
    }

    .zone-group.selected.editor .resize-handle,
    .zone-group.editor .resize-handle {
      display: block;
    }

    .zone-label {
      display: none;
      pointer-events: none;
      fill: #ffffff;
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(1, 34, 73, 0.85);
      stroke-width: 2px;
      vector-effect: non-scaling-stroke;
    }

    .zone-group.editor .zone-label {
      display: block;
    }

    .status-bar {
      padding: 10px 14px 14px;
      font-size: 14px;
      color: var(--muted);
      background: #012249;
      white-space: pre-wrap;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.48);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 90;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: var(--modal-bg);
      color: var(--text);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      box-shadow: var(--shadow);
      transform: translateY(105%);
      transition: transform 0.28s ease;
      padding: 10px 16px calc(18px + env(safe-area-inset-bottom));
      max-height: 78vh;
      overflow-y: auto;
      border-top: 1px solid var(--border);
    }

    .modal-sheet.open {
      transform: translateY(0);
    }

    .drag-handle {
      width: 54px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      margin: 6px auto 14px;
    }

    .modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-title-wrap {
      min-width: 0;
    }

    .modal-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      color: var(--text);
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .modal-close {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 10px;
      min-height: 40px;
      min-width: 40px;
      cursor: pointer;
      font-size: 18px;
    }

    .modal-body {
      font-size: 16px;
      line-height: 1.5;
    }

    .detail-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .detail-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
    }

    .detail-label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .detail-value {
      color: var(--text);
      word-break: break-word;
    }

    @media (min-width: 900px) {
      .toolbar {
        padding: 14px 16px;
      }

      .map-shell {
        max-width: 1280px;
        margin: 0 auto;
      }

      .modal-sheet {
        left: auto;
        right: 24px;
        bottom: 24px;
        width: min(420px, calc(100vw - 48px));
        max-height: 72vh;
        border-radius: 18px;
        transform: translateY(120%);
      }

      .modal-sheet.open {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <input id="searchBox" type="search" placeholder="Search booth, pack, feature, or note" />
      <select id="jumpMenu">
        <option value="">Jump to booth or feature</option>
      </select>
      <button id="copyLayoutBtn" type="button">Copy Layout JSON</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>

    <div class="map-shell">
      <div class="map-wrapper" id="mapWrapper">
        <img
          id="mapImage"
          src="floorplan.png"
          alt="Interactive America250 floor plan"
        />
        <svg
          id="overlay"
          class="map-overlay"
          viewBox="0 0 1544 2000"
          preserveAspectRatio="xMidYMid meet"
          aria-label="Interactive booth overlay"
        ></svg>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      Tap a booth or feature to open details.
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop"></div>

  <section id="modalSheet" class="modal-sheet" aria-hidden="true">
    <div class="drag-handle"></div>

    <div class="modal-header">
      <div class="modal-title-wrap">
        <h2 class="modal-title" id="modalTitle">Select a booth</h2>
        <p class="modal-subtitle" id="modalSubtitle">Tap any booth or feature on the map</p>
      </div>
      <button id="closeModalBtn" class="modal-close" type="button" aria-label="Close">×</button>
    </div>

    <div class="modal-body" id="modalBody">
      <ul class="detail-list">
        <li class="detail-item">
          <span class="detail-label">Instructions</span>
          <div class="detail-value">Tap a booth or event feature to view details here.</div>
        </li>

    </div>
  </section>

    function isMobileView() {
      return window.matchMedia("(max-width: 900px)").matches;
    }

    function shouldShowOverlay() {
      return SHOW_OVERLAY || EDITOR_MODE;
    }

    function getBoothHitPadding() {
      return isMobileView() ? MOBILE_HIT_PADDING : DESKTOP_HIT_PADDING;
    }

    function getFeatureHitPadding() {
      return isMobileView() ? MOBILE_FEATURE_PADDING : DESKTOP_FEATURE_PADDING;
    }

    function getZoneStyle(isSelected = false) {
      if (shouldShowOverlay()) {
        return {
          fill: isSelected ? "var(--selected-fill)" : "var(--overlay-fill)",
          stroke: isSelected ? "var(--selected-stroke)" : "var(--overlay-stroke)",
          strokeWidth: isSelected ? "2" : "1"
        };
      }

      return {
        fill: "transparent",
        stroke: "transparent",
        strokeWidth: "0"
      };
    }

    function applyZoneStyle(group, isSelected = false) {
      const rect = group.querySelector(".zone");
      const handle = group.querySelector(".resize-handle");
      const label = group.querySelector(".zone-label");
      const style = getZoneStyle(isSelected);

      rect.setAttribute("fill", style.fill);
      rect.setAttribute("stroke", style.stroke);
      rect.setAttribute("stroke-width", style.strokeWidth);
      rect.style.pointerEvents = "all";

      group.classList.toggle("selected", isSelected);
      group.classList.toggle("editor", EDITOR_MODE);

      if (handle) {
        handle.style.display = EDITOR_MODE ? "block" : "none";
      }
      if (label) {
        label.style.display = EDITOR_MODE ? "block" : "none";
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function makeBooth(id, title, section, x, y, w, h, extra = {}) {
      return {
        id,
        title,
        section,
        description: extra.description || `Booth ${id}`,
        notes: extra.notes || "",
        contact: extra.contact || "",
        status: extra.status || "Open",
        coords: { x, y, w, h },
        link: extra.link || ""
      };
    }

    /* ==========================================================
       ZONE OVERRIDE HELPERS
       ========================================================== */

      const o = zoneOverrides[zone.id];
      if (!o) return zone;

      return {
        ...zone,
        coords: {
          x: o.x ?? zone.coords.x,
          y: o.y ?? zone.coords.y,
          w: o.w ?? zone.coords.w,
          h: o.h ?? zone.coords.h
        }
      };
    }

    function applyOverrideToFeature(id, title, section, description, x, y, w, h, extra = {}) {
      const pad = getFeatureHitPadding();

      const zone = {
        id,
        title,
        section,
        description: description || "",
        notes: extra.notes || "",
        contact: extra.contact || "",
        status: extra.status || "Feature",
        link: extra.link || "",
        coords: {
          x: x - pad,
          y: y - pad,
          w: w + (pad * 2),
          h: h + (pad * 2)
        }
      };

      zones.set(id, applyOverride(zone));
    }

    function buildBooths() {
      zones.clear();

      const pad = getBoothHitPadding();

      ["A", "B", "C", "D"].forEach(section => {
        const s = layout[section];

        for (let i = 0; i < s.rows; i++) {
          const num = s.rows - i;
          const id = section + num;

          const x = s.x - pad;
          const y = (s.y + (i * s.h)) - pad;
          const w = s.w + (pad * 2);
          const h = s.h + (pad * 2);

          zones.set(id, applyOverride(
            makeBooth(id, id, section, x, y, w, h)
          ));
        }
      });

      applyOverrideToFeature(
        "REGISTRATION",
        "Registration",
        "North Entrance",
        "Main check-in area.",
        565, 110, 300, 98,
        { notes: "Add hours or volunteer notes here." }
      );

      applyOverrideToFeature(
        "FIRST_AID",
        "First Aid",
        "Northwest",
        "Medical support area.",
        437, 112, 96, 96
      );

      applyOverrideToFeature(
        "TRACK_1",
        "Pinewood Derby Track 1",
        "Center Floor",
        "Upper race track area.",
        621, 410, 244, 108
      );

      applyOverrideToFeature(
        "TRACK_2",
        "Pinewood Derby Track 2",
        "Center Floor",
        "Lower race track area.",
        621, 1189, 244, 104
      );

      applyOverrideToFeature(
        "VIP_AREA",
        "VIP Area",
        "Southwest",
        "VIP reserved area.",
        383, 1121, 139, 660
      );

      applyOverrideToFeature(
        "EVENT_STAGE",
        "Event Stage Area",
        "South Center",
        "Stage / ceremony area.",
        640, 1543, 518, 285
      );

      applyOverrideToFeature(
        "LOADING",
        "Event Loading",
        "East Side",
        "Loading / support area.",
        1048, 775, 198, 156
      );

      applyOverrideToFeature(
        "RESTROOM_NORTH",
        "Restrooms (North)",
        "Northeast",
        "North restroom area.",
        937, 107, 104, 104
      );

      applyOverrideToFeature(
        "RESTROOM_SOUTH",
        "Restrooms (South)",
        "South Entrance",
        "South restroom area.",
        776, 1822, 98, 98
      );

      const customAssignments = {
        A1: {
          title: "Booth A1",
          description: "Assign this booth",
          notes: "Replace with your real assignment data."
        },
        B16: {
          title: "Booth B16",
          description: "Assign this booth"
        },
        C18: {
          title: "Booth C18",
          description: "Assign this booth"
        },
        D1: {
          title: "Booth D1",
          description: "Assign this booth"
        },
        REGISTRATION: {
          notes: "Check-in opens here."
        },
        FIRST_AID: {
          notes: "Medical support / first response station."
        },
        EVENT_STAGE: {
          notes: "Main stage and program area."
        }
      };

      Object.entries(customAssignments).forEach(([id, data]) => {
        if (zones.has(id)) {
          zones.set(id, { ...zones.get(id), ...data });
        }
      });
    }

    function updateGroupGeometry(group, zone) {
      const rect = group.querySelector(".zone");
      const handle = group.querySelector(".resize-handle");
      const label = group.querySelector(".zone-label");

      rect.setAttribute("x", zone.coords.x);
      rect.setAttribute("y", zone.coords.y);
      rect.setAttribute("width", zone.coords.w);
      rect.setAttribute("height", zone.coords.h);

      if (handle) {
        handle.setAttribute("x", zone.coords.x + zone.coords.w - HANDLE_SIZE);
        handle.setAttribute("y", zone.coords.y + zone.coords.h - HANDLE_SIZE);
        handle.setAttribute("width", HANDLE_SIZE);
        handle.setAttribute("height", HANDLE_SIZE);
      }

      if (label) {
        label.setAttribute("x", zone.coords.x + 4);
        label.setAttribute("y", zone.coords.y + 14);
        label.textContent = zone.id;
      }
    }

    function renderModal(zone) {
      modalTitle.textContent = `${zone.id} — ${zone.title}`;
      modalSubtitle.textContent = `${zone.section} • ${zone.status}`;

      const details = [
        { label: "Description", value: escapeHtml(zone.description || "") },
        { label: "Notes", value: escapeHtml(zone.notes || "No notes added.") },
        {
          label: "Coords",
          value: `x:${Math.round(zone.coords.x)} y:${Math.round(zone.coords.y)} w:${Math.round(zone.coords.w)} h:${Math.round(zone.coords.h)}`
        }
      ];

      if (zone.contact) {
        details.push({ label: "Contact", value: escapeHtml(zone.contact) });
      }

      if (zone.link) {
        details.push({
          label: "Link",
          value: `<a href="${escapeHtml(zone.link)}" target="_blank" rel="noopener" style="color:#ffffff;">Open related link</a>`
        });
      }

      modalBody.innerHTML = `
        <ul class="detail-list">
          ${details.map(item => `
            <li class="detail-item">
              <span class="detail-label">${escapeHtml(item.label)}</span>
              <div class="detail-value">${item.value}</div>
            </li>
          `).join("")}
        </ul>
      `;
    }

    function openModal() {
      modalBackdrop.classList.add("open");
      modalSheet.classList.add("open");
      modalSheet.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      modalSheet.classList.remove("open");
      modalSheet.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function selectZone(id, openDetails = true) {
      const zone = zones.get(id);
      if (!zone) return;

      currentSelection = id;

      svg.querySelectorAll(".zone-group").forEach(group => {
        applyZoneStyle(group, group.dataset.id === id);
      });

      jumpMenu.value = id;
      statusBar.textContent = EDITOR_MODE
        ? `Selected ${zone.id} — drag to move, drag handle to resize`
        : `Selected ${zone.id} — ${zone.title}`;

      if (openDetails) {
        renderModal(zone);
        openModal();
      }

      history.replaceState(null, "", `#${encodeURIComponent(id)}`);
    }

    function drawZones() {
      svg.innerHTML = "";

      zones.forEach((zone) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", "zone-group");
        group.setAttribute("tabindex", "0");
        group.setAttribute("role", "button");
        group.setAttribute("aria-label", `${zone.id} ${zone.title}`);
        group.dataset.id = zone.id;

        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("class", "zone");
        rect.setAttribute("rx", "3");
        rect.setAttribute("ry", "3");

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("class", "zone-label");

        const handle = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        handle.setAttribute("class", "resize-handle");
        handle.setAttribute("rx", "3");
        handle.setAttribute("ry", "3");
        handle.setAttribute("fill", "var(--handle-fill)");
        handle.setAttribute("stroke", "var(--handle-stroke)");
        handle.setAttribute("stroke-width", "1");
        handle.dataset.handleFor = zone.id;

        group.appendChild(rect);
        group.appendChild(label);
        group.appendChild(handle);
        svg.appendChild(group);

        updateGroupGeometry(group, zone);
        applyZoneStyle(group, zone.id === currentSelection);

        group.addEventListener("pointerdown", (e) => {
          if (!EDITOR_MODE) return;
          beginPointerEdit(e, zone.id, "move");
        });

        handle.addEventListener("pointerdown", (e) => {
          if (!EDITOR_MODE) return;
          e.stopPropagation();
          beginPointerEdit(e, zone.id, "resize");
        });

        group.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();

          if (dragState && dragState.moved) return;

          selectZone(zone.id, true);
        });

        group.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            selectZone(zone.id, true);
          }
        });
      });
    }

    function svgPointFromEvent(evt) {
      const pt = svg.createSVGPoint();
      pt.x = evt.clientX;
      pt.y = evt.clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function beginPointerEdit(evt, id, mode) {
      const zone = zones.get(id);
      if (!zone) return;

      const group = svg.querySelector(`.zone-group[data-id="${CSS.escape(id)}"]`);
      if (!group) return;

      const startPt = svgPointFromEvent(evt);

      dragState = {
        id,
        mode,
        pointerId: evt.pointerId,
        startX: startPt.x,
        startY: startPt.y,
        origin: { ...zone.coords },
        moved: false
      };

      selectZone(id, false);

      group.setPointerCapture?.(evt.pointerId);
      evt.preventDefault();
      evt.stopPropagation();
    }

    function onPointerMove(evt) {
      if (!dragState || !EDITOR_MODE) return;

      const zone = zones.get(dragState.id);
      const group = svg.querySelector(`.zone-group[data-id="${CSS.escape(dragState.id)}"]`);
      if (!zone || !group) return;

      const pt = svgPointFromEvent(evt);
      const dx = pt.x - dragState.startX;
      const dy = pt.y - dragState.startY;

      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        dragState.moved = true;
      }

      if (dragState.mode === "move") {
        zone.coords.x = clamp(dragState.origin.x + dx, 0, IMAGE_WIDTH - zone.coords.w);
        zone.coords.y = clamp(dragState.origin.y + dy, 0, IMAGE_HEIGHT - zone.coords.h);
      } else if (dragState.mode === "resize") {
        zone.coords.w = clamp(dragState.origin.w + dx, MIN_ZONE_SIZE, IMAGE_WIDTH - zone.coords.x);
        zone.coords.h = clamp(dragState.origin.h + dy, MIN_ZONE_SIZE, IMAGE_HEIGHT - zone.coords.y);
      }

      updateGroupGeometry(group, zone);
      statusBar.textContent = `${zone.id} → x:${Math.round(zone.coords.x)} y:${Math.round(zone.coords.y)} w:${Math.round(zone.coords.w)} h:${Math.round(zone.coords.h)}`;
    }

    function onPointerUp(evt) {
      if (!dragState) return;
      dragState = null;
      evt.preventDefault();
    }

    function populateJumpMenu() {
      jumpMenu.innerHTML = `<option value="">Jump to booth or feature</option>`;

      [...zones.values()]
        .sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric: true }))
        .forEach(zone => {
          const opt = document.createElement("option");
          opt.value = zone.id;
          opt.textContent = `${zone.id} — ${zone.title}`;
          jumpMenu.appendChild(opt);
        });
    }

    function clearSelection() {
      currentSelection = "";
      svg.querySelectorAll(".zone-group").forEach(group => applyZoneStyle(group, false));
      jumpMenu.value = "";
      searchBox.value = "";
      svg.querySelectorAll(".zone-group").forEach(group => {
        group.style.opacity = "1";
        group.style.pointerEvents = "all";
      });
      statusBar.textContent = EDITOR_MODE
        ? "Editor mode is on — drag boxes to move, drag handles to resize."
        : "Tap a booth or feature to open details.";
      history.replaceState(null, "", location.pathname + location.search);
      closeModal();
    }

    function searchZones(query) {
      const q = (query || "").toLowerCase().trim();

      if (!q) {
        svg.querySelectorAll(".zone-group").forEach(group => {
          group.style.opacity = "1";
          group.style.pointerEvents = "all";
        });
        statusBar.textContent = currentSelection
          ? `Selected ${currentSelection}`
          : (EDITOR_MODE
              ? "Editor mode is on — drag boxes to move, drag handles to resize."
              : "Tap a booth or feature to open details.");
        return;
      }

      let firstMatch = "";
      let count = 0;

      zones.forEach((zone, id) => {
        const haystack = [
          zone.id,
          zone.title,
          zone.section,
          zone.description,
          zone.notes,
          zone.contact,
          zone.status
        ].join(" ").toLowerCase();

        const match = haystack.includes(q);
        const group = svg.querySelector(`.zone-group[data-id="${CSS.escape(id)}"]`);

        if (group) {
          group.style.opacity = match ? "1" : "0.08";
          group.style.pointerEvents = match ? "all" : "none";
        }

        if (match) {
          count++;
          if (!firstMatch) firstMatch = id;
        }
      });

      statusBar.textContent = count
        ? `${count} match${count === 1 ? "" : "es"} found`
        : "No matches found";

      if (count === 1 && firstMatch) {
        selectZone(firstMatch, true);
      }
    }

    function collectLayoutOverrides() {
      const overrides = {};
      zones.forEach((zone, id) => {
        overrides[id] = {
          x: Math.round(zone.coords.x),
          y: Math.round(zone.coords.y),
          w: Math.round(zone.coords.w),
          h: Math.round(zone.coords.h)
        };
      });
      return overrides;
    }

    async function copyLayoutJson() {
      const json = JSON.stringify(collectLayoutOverrides(), null, 2);
      try {
        await navigator.clipboard.writeText(json);
        statusBar.textContent = "Layout JSON copied to clipboard. Paste it into zoneOverrides.";
      } catch {
        statusBar.textContent = "Unable to copy automatically. JSON was written to the console.";
        console.log(json);
      }
    }

    function init() {
      buildBooths();
      drawZones();
      populateJumpMenu();

      searchBox.addEventListener("input", (e) => {
        searchZones(e.target.value);
      });

      jumpMenu.addEventListener("change", () => {
        if (jumpMenu.value) {
          selectZone(jumpMenu.value, true);
        }
      });

      clearBtn.addEventListener("click", clearSelection);
      copyLayoutBtn.addEventListener("click", copyLayoutJson);

      modalBackdrop.addEventListener("click", closeModal);
      closeModalBtn.addEventListener("click", closeModal);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      svg.addEventListener("pointermove", onPointerMove);
      svg.addEventListener("pointerup", onPointerUp);
      svg.addEventListener("pointercancel", onPointerUp);
      svg.addEventListener("pointerleave", onPointerUp);

      const hash = decodeURIComponent(location.hash.replace(/^#/, ""));
      if (hash && zones.has(hash)) {
        selectZone(hash, true);
      }

      statusBar.textContent = EDITOR_MODE
        ? "Editor mode is on — drag boxes to move, drag handles to resize."
        : "Tap a booth or feature to open details.";
    }

    init();
  </script>
</body>
</html>
