<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
<title>America250 Map</title>

<style>
body { margin:0; background:#012249; color:#fff; font-family:Arial }

.toolbar {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px;
  background:#012249;
}

.toolbar input, .toolbar select, .toolbar button {
  min-height:44px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.2);
  background:#ffffff10;
  color:#fff;
  padding:10px;
}

.map-wrapper {
  position:relative;
  overflow:hidden;

  /* ✅ KEY CHANGE */
  touch-action: pan-y pinch-zoom;
  overscroll-behavior: contain;
}

.map-zoom-layer {
  transform-origin:0 0;
  will-change:transform;
}

.map-wrapper img {
  width:100%;
  pointer-events:none;
}

.map-overlay {
  position:absolute;
  inset:0;

  /* ✅ KEY CHANGE */
  touch-action: pan-y pinch-zoom;
}

.zone {
  fill:transparent;
  stroke:red;
  stroke-width:1;
  cursor:pointer;
}

.modal-sheet {
  position:fixed;
  left:12px;
  right:12px;
  bottom:12px;
  background:#012249;
  border:1px solid rgba(255,255,255,.2);
  border-radius:16px;
  padding:15px;
  transform:translateY(120%);
  transition:.3s;
}

.modal-sheet.open { transform:translateY(0); }

.detail-item {
  border:1px solid rgba(255,255,255,.2);
  padding:10px;
}

</style>
</head>

<body>

<div class="toolbar">
  <input id="searchBox" placeholder="Search" />
  <select id="jumpMenu">
    <option value="">Jump to booth or feature</option>
  </select>
  <button id="copyLayoutBtn">Copy Layout</button>
  <button id="clearBtn">Clear</button>
</div>

<div class="map-wrapper" id="mapWrapper">
  <div id="zoomLayer" class="map-zoom-layer">
    <img src="floorplan.png" />
    <svg id="overlay" viewBox="0 0 1544 2000" class="map-overlay"></svg>
  </div>
</div>

<div id="modalSheet" class="modal-sheet">
  <h3 id="modalTitle"></h3>
  <div id="modalBody"></div>
  <button onclick="closeModal()">Close</button>
</div>

<script>
const zones = new Map();
const svg = document.getElementById("overlay");
const wrapper = document.getElementById("mapWrapper");
const layer = document.getElementById("zoomLayer");

let suppressTap = 0;

// ✅ clean escape
function escapeHtml(v){
  return String(v||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

// ---------- demo CSV-like load ----------
zones.set("A1",{id:"A1",title:"Booth A1",description:"Sample",coords:{x:500,y:1200,w:60,h:40}});
zones.set("REG",{id:"REG",title:"Registration",description:"Main check-in",coords:{x:600,y:120,w:250,h:100}});

function draw(){
  svg.innerHTML="";
  zones.forEach(z=>{
    const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
    r.setAttribute("x",z.coords.x);
    r.setAttribute("y",z.coords.y);
    r.setAttribute("width",z.coords.w);
    r.setAttribute("height",z.coords.h);
    r.classList.add("zone");

    r.addEventListener("click",(e)=>{
      if(performance.now()<suppressTap) return;
      showModal(z);
    });

    svg.appendChild(r);
  });
}

function showModal(z){
  modalTitle.innerText = z.id+" — "+z.title;
  modalBody.innerHTML = `<div class="detail-item">${escapeHtml(z.description)}</div>`;
  modal.classList.add("open");
}

function closeModal(){
  modal.classList.remove("open");
}

const modal=document.getElementById("modalSheet");
const modalTitle=document.getElementById("modalTitle");
const modalBody=document.getElementById("modalBody");

// ---------- polished zoom ----------
let zState={scale:1,x:0,y:0,startDist:0,startScale:1,panX:0,panY:0,lastX:0,lastY:0,lastT:0,vx:0,vy:0,moved:false,tapTime:0};

function dist(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY)}

function apply(){
  layer.style.transform=`translate(${zState.x}px,${zState.y}px) scale(${zState.scale})`;
}

// ✅ DO NOT BLOCK NORMAL SCROLL unless zooming
wrapper.addEventListener("touchstart",(e)=>{
  if(e.touches.length===2){
    e.preventDefault();
    zState.startDist=dist(e.touches[0],e.touches[1]);
    zState.startScale=zState.scale;
  }

  if(e.touches.length===1 && zState.scale>1){
    const t=e.touches[0];
    zState.panX=t.clientX-zState.x;
    zState.panY=t.clientY-zState.y;
    zState.lastX=t.clientX;
    zState.lastY=t.clientY;
    zState.lastT=performance.now();
    zState.vx=0; zState.vy=0;
  }
},{passive:false});

wrapper.addEventListener("touchmove",(e)=>{
  if(e.touches.length===2){
    e.preventDefault();

    const d=dist(e.touches[0],e.touches[1]);
    zState.scale=Math.min(4,Math.max(1,zState.startScale*(d/zState.startDist)));

    apply();
    zState.moved=true;
    return;
  }

  if(e.touches.length===1 && zState.scale>1){
    e.preventDefault();

    const t=e.touches[0];
    const now=performance.now();
    const dt=now-zState.lastT;

    zState.x=t.clientX-zState.panX;
    zState.y=t.clientY-zState.panY;

    zState.vx=(t.clientX-zState.lastX)/dt*16;
    zState.vy=(t.clientY-zState.lastY)/dt*16;

    zState.lastX=t.clientX;
    zState.lastY=t.clientY;
    zState.lastT=now;

    apply();
    zState.moved=true;
  }
},{passive:false});

wrapper.addEventListener("touchend",()=>{
  if(zState.moved){
    suppressTap=performance.now()+250;
    zState.moved=false;
  }
});

// ---------- init ----------
draw();
</script>

</body>
</html>
