<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>America250 Map</title>

<style>
:root {
  --bg: #012249;
  --text: #ffffff;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
}

/* ✅ RESPONSIVE LAYOUT */
.app {
  display: grid;
  grid-template-columns: 1fr 350px;
  height: 100vh;
}

/* ✅ STACK ON MOBILE */
@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    height: auto;
  }
}

/* MAP */
.map-container {
  position: relative;
}

.map-wrapper {
  position: relative;
  width: 100%;
}

.map-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ✅ SVG overlays always aligned */
svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* OVERLAY */
.zone {
  cursor: pointer;
}

/* PANEL */
.panel {
  background: #012249;
  padding: 20px;
  border-left: 1px solid rgba(255,255,255,0.2);
  overflow-y: auto;
}

/* ✅ MOBILE PANEL STYLE */
@media (max-width: 900px) {
  .panel {
    border-left: none;
    border-top: 1px solid rgba(255,255,255,0.2);
  }
}

.panel h2 {
  margin-top: 0;
}

/* TOOLBAR */
.toolbar {
  padding: 10px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* ✅ MOBILE STACK */
@media (max-width: 600px) {
  .toolbar {
    flex-direction: column;
  }

  input, select, button {
    width: 100%;
  }
}

/* INPUTS */
input, select, button {
  background: #012249;
  color: #ffffff;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 10px;
  font-size: 16px; /* ✅ mobile-friendly font */
}

input::placeholder {
  color: rgba(255,255,255,0.6);
}

button:hover {
  background: rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<div class="app">

  <!-- MAP -->
  <div class="map-container">

    <div class="toolbar">
      <input id="search" placeholder="Search booth..." />
      <select id="jump">
        <option value="">Jump to booth</option>
      </select>
    </div>

    <div class="map-wrapper">
      <img src="A250 Map Online Version.png">
      <svg id="overlay" viewBox="0 0 1544 2000"></svg>
    </div>

  </div>

  <!-- PANEL -->
  <div class="panel">
    <h2 id="title">Select a Booth</h2>
    <div id="content">Tap a booth on the map</div>
  </div>

</div>

<script>

/* ✅ TOGGLE */
const SHOW_OVERLAY = false;

/* LAYOUT */
const layout = {
  A: { x: 510, y: 550, w: 55, h: 34, rows: 18 },
  B: { x: 680, y: 620, w: 56, h: 34, rows: 16 },
  C: { x: 740, y: 550, w: 56, h: 34, rows: 18 },
  D: { x: 910, y: 550, w: 56, h: 34, rows: 18 }
};

const zones = {};
const svg = document.getElementById("overlay");

/* STYLE TOGGLE */
function applyOverlayStyle(rect) {
  if (SHOW_OVERLAY) {
    rect.setAttribute("fill", "rgba(255,255,255,0.2)");
    rect.setAttribute("stroke", "#ffffff");
    rect.setAttribute("stroke-width", "1");
  } else {
    rect.setAttribute("fill", "transparent");
    rect.setAttribute("stroke", "transparent");
  }
}

/* GENERATE BOOTHS */
function generate(section) {
  let s = layout[section];

  for (let i = 0; i < s.rows; i++) {

    let num = s.rows - i;
    let id = section + num;

    let rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

    rect.setAttribute("x", s.x);
    rect.setAttribute("y", s.y + (i * s.h));
    rect.setAttribute("width", s.w);
    rect.setAttribute("height", s.h);

    applyOverlayStyle(rect);

    rect.dataset.id = id;

    rect.onclick = () => select(id);

    svg.appendChild(rect);

    zones[id] = {
      title: id,
      desc: "Assign this booth"
    };
  }
}

["A","B","C","D"].forEach(generate);

/* DATA */
Object.assign(zones, {
  REGISTRATION: { title: "Registration", desc: "Check-in area" },
  VIP: { title: "VIP Area", desc: "Reserved seating" }
});

/* SELECTION */
function select(id) {

  document.querySelectorAll("#overlay rect").forEach(r => {
    applyOverlayStyle(r);
  });

  let selectedRect = document.querySelector(`[data-id='${id}']`);

  if (SHOW_OVERLAY && selectedRect) {
    selectedRect.setAttribute("fill", "rgba(255,255,255,0.4)");
  }

  let data = zones[id] || { title: id, desc: "No data" };

  document.getElementById("title").innerText = data.title;
  document.getElementById("content").innerText = data.desc;

  location.hash = id;
}

/* SEARCH */
document.getElementById("search").oninput = (e) => {
  let val = e.target.value.toLowerCase();

  document.querySelectorAll("#overlay rect").forEach(r => {
    let id = r.dataset.id;
    let match = id.toLowerCase().includes(val);

    r.style.opacity = match || !val ? 1 : 0.1;
    r.style.pointerEvents = match || !val ? "auto" : "none";
  });
};

/* JUMP MENU */
let jump = document.getElementById("jump");

Object.keys(zones).sort().forEach(id => {
  let opt = document.createElement("option");
  opt.value = id;
  opt.textContent = id;
  jump.appendChild(opt);
});

jump.onchange = () => {
  if (jump.value) select(jump.value);
};

/* HASH LOAD */
if (location.hash) {
  let id = location.hash.replace("#","");
  if (zones[id]) select(id);
}

</script>

</body>
</html>
