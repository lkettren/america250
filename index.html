<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Updated viewport for pinch zoom -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
  />

  <title>America250 Map</title>

  <style>
    :root {
      --bg: #012249;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);
      --border: rgba(255, 255, 255, 0.22);
      --input-bg: rgba(255, 255, 255, 0.06);
      --modal-bg: #012249;
      --overlay-fill: rgba(255, 255, 255, 0.16);
      --overlay-stroke: rgba(255, 0, 0, 0.85);
      --selected-fill: rgba(255, 255, 255, 0.28);
      --selected-stroke: #ffffff;
      --handle-fill: #ffffff;
      --handle-stroke: #012249;
      --shadow: 0 -12px 26px rgba(0, 0, 0, 0.35);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      background: #012249;
      border-bottom: 1px solid var(--border);
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      padding: 10px 12px;
      outline: none;
    }

    .toolbar input::placeholder {
      color: var(--muted);
    }

    .toolbar input {
      flex: 1 1 220px;
      min-width: 0;
    }

    .toolbar select {
      flex: 1 1 180px;
      min-width: 0;
    }

    .toolbar button {
      flex: 0 0 auto;
      cursor: pointer;
    }

    .toolbar button:hover,
    .toolbar button:focus-visible {
      background: rgba(255, 255, 255, 0.12);
    }

    .map-shell {
      width: 100%;
      padding: 0;
      margin: 0;
      background: #012249;
    }

    
    .map-wrapper {
      position: relative;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      line-height: 0;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: contain;
    }



    .map-zoom-layer {
      position: relative;
      transform-origin: 0 0;
      will-change: transform;
    }


    .map-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

        .map-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      z-index: 5;
      touch-action: none;
    }

    .zone-group {
      pointer-events: all;
    }

    .zone {
      cursor: pointer;
      vector-effect: non-scaling-stroke;
      pointer-events: all;
    }

    .zone-group.editing .zone {
      cursor: move;
    }

    .zone-group.selected .zone {
      stroke-dasharray: 6 4;
    }

    .resize-handle {
      display: none;
      pointer-events: all;
      cursor: nwse-resize;
      vector-effect: non-scaling-stroke;
    }

    .zone-group.selected.editor .resize-handle,
    .zone-group.editor .resize-handle {
      display: block;
    }

    .zone-label {
      display: none;
      pointer-events: none;
      fill: #ffffff;
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(1, 34, 73, 0.85);
      stroke-width: 2px;
      vector-effect: non-scaling-stroke;
    }

    .zone-group.editor .zone-label {
      display: block;
    }

    .status-bar {
      padding: 10px 14px 14px;
      font-size: 14px;
      color: var(--muted);
      background: #012249;
      white-space: pre-wrap;
    }

    /* Removed backdrop darkening entirely */
    .modal-backdrop {
      display: none;
    }

    /* Improved mobile modal anchoring */
    .modal-sheet {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 100;

      background: var(--modal-bg);
      color: var(--text);

      border-radius: 18px;
      border: 1px solid var(--border);

      box-shadow: var(--shadow);

      transform: translateY(120%);
      transition: transform 0.28s ease;

      padding:
        10px
        16px
        calc(18px + env(safe-area-inset-bottom));

      max-height: min(70vh, 680px);

      overflow-y: auto;

      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .modal-sheet.open {
      transform: translateY(0);
    }

    .drag-handle {
      width: 54px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      margin: 6px auto 14px;
    }

    .modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-title-wrap {
      min-width: 0;
    }

    .modal-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      color: var(--text);
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .modal-close {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 10px;
      min-height: 40px;
      min-width: 40px;
      cursor: pointer;
      font-size: 18px;
    }

    .modal-body {
      font-size: 16px;
      line-height: 1.5;
    }

    .detail-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .detail-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
    }

    .detail-label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .detail-value {
      color: var(--text);
      word-break: break-word;
    }

    @media (min-width: 900px) {
      .toolbar {
        padding: 14px 16px;
      }

      .map-shell {
        max-width: 1280px;
        margin: 0 auto;
      }

      .modal-sheet {
        left: auto;
        right: 24px;
        bottom: 24px;

        width: 420px;

        max-height: 72vh;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="toolbar">
      <input
        id="searchBox"
        type="search"
        placeholder="Search booth or feature"
      />

      <select id="jumpMenu">
        <option value="">Jump to booth or feature</option>
      </select>

      <button id="copyLayoutBtn" type="button">
        Copy Layout JSON
      </button>

      <button id="clearBtn" type="button">
        Clear
      </button>
    </div>

    <div class="map-shell">
      <div class="map-wrapper" id="mapWrapper">

        <div class="map-zoom-layer" id="zoomLayer">

          <img
            id="mapImage"
            src="floorplan.png"
            alt="Interactive America250 floor plan"
          />

          <svg
            id="overlay"
            class="map-overlay"
            viewBox="0 0 1544 2000"
            preserveAspectRatio="xMidYMid meet"
            aria-label="Interactive booth overlay"
          ></svg>

        </div>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      Tap a booth or feature to open details.
    </div>
  </div>

  <section
    id="modalSheet"
    class="modal-sheet"
    aria-hidden="true"
  >

    <div class="drag-handle"></div>

    <div class="modal-header">

      <div class="modal-title-wrap">
        <h2 class="modal-title" id="modalTitle">
          Select a booth
        </h2>

        <p class="modal-subtitle" id="modalSubtitle">
          Tap any booth or feature on the map
        </p>
      </div>

      <button
        id="closeModalBtn"
        class="modal-close"
        type="button"
        aria-label="Close"
      >
        ×
      </button>

    </div>

    <div class="modal-body" id="modalBody">
      <ul class="detail-list">
        <li class="detail-item">
          <span class="detail-label">Instructions</span>
          <div class="detail-value">
            Tap a booth or feature to view details here.
          </div>
        </li>
      </ul>
    </div>

  </section>

  <script>
    /* ==========================================================
       TOGGLES
       ========================================================== */

    const SHOW_OVERLAY = false;
    const EDITOR_MODE = false;

    /* ==========================================================
       Constants
       ========================================================== */

    const MOBILE_HIT_PADDING = 8;
    const DESKTOP_HIT_PADDING = 2;

    const MOBILE_FEATURE_PADDING = 14;
    const DESKTOP_FEATURE_PADDING = 6;

    const MIN_ZONE_SIZE = 20;
    const HANDLE_SIZE = 18;

    const IMAGE_WIDTH = 1544;
    const IMAGE_HEIGHT = 2000;

    /* ==========================================================
       DOM
       ========================================================== */

    const svg = document.getElementById("overlay");

    const searchBox = document.getElementById("searchBox");
    const jumpMenu = document.getElementById("jumpMenu");

    const clearBtn = document.getElementById("clearBtn");
    const copyLayoutBtn = document.getElementById("copyLayoutBtn");

    const statusBar = document.getElementById("statusBar");

    const modalSheet = document.getElementById("modalSheet");
    const closeModalBtn = document.getElementById("closeModalBtn");

    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalBody = document.getElementById("modalBody");

    /* ==========================================================
       State
       ========================================================== */

    const zones = new Map();

    let currentSelection = "";
    let dragState = null;

    
const mapWrapper = document.getElementById("mapWrapper");
const zoomLayer = document.getElementById("zoomLayer");
const mapImage = document.getElementById("mapImage");

let suppressTapUntil = 0;

let zState = {
  scale: 1,
  x: 0,
  y: 0,
  startDist: 0,
  startScale: 1,
  panStartX: 0,
  panStartY: 0,
  lastX: 0,
  lastY: 0,
  lastT: 0,
  vx: 0,
  vy: 0,
  moved: false
};

function applyZoom() {
  zoomLayer.style.transform =
    `translate(${zState.x}px,${zState.y}px) scale(${zState.scale})`;
}

function dist(a,b){
  return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
}

mapWrapper.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    zState.startDist = dist(e.touches[0], e.touches[1]);
    zState.startScale = zState.scale;
  }

  if (e.touches.length === 1 && zState.scale > 1) {
    const t = e.touches[0];
    zState.panStartX = t.clientX - zState.x;
    zState.panStartY = t.clientY - zState.y;

    zState.lastX = t.clientX;
    zState.lastY = t.clientY;
    zState.lastT = performance.now();
    zState.vx = 0;
    zState.vy = 0;
    zState.moved = false;
  }
}, { passive:false });

mapWrapper.addEventListener("touchmove", e => {

  if (e.touches.length === 2) {
    e.preventDefault();
    const d = dist(e.touches[0], e.touches[1]);
    zState.scale = Math.min(4, Math.max(1, zState.startScale * (d / zState.startDist)));
    applyZoom();
  }

  if (e.touches.length === 1 && zState.scale > 1) {
    e.preventDefault();

    const t = e.touches[0];
    const now = performance.now();
    const dt = now - zState.lastT;

    zState.x = t.clientX - zState.panStartX;
    zState.y = t.clientY - zState.panStartY;

    zState.vx = (t.clientX - zState.lastX) / dt * 16;
    zState.vy = (t.clientY - zState.lastY) / dt * 16;

    zState.lastX = t.clientX;
    zState.lastY = t.clientY;
    zState.lastT = now;

    zState.moved = true;

    applyZoom();
  }

}, { passive:false });


    /* ==========================================================
       Helpers
       ========================================================== */

    function isMobileView() {
      return window.matchMedia("(max-width: 900px)").matches;
    }

    function getBoothHitPadding() {
      return isMobileView()
        ? MOBILE_HIT_PADDING
        : DESKTOP_HIT_PADDING;
    }

    function getFeatureHitPadding() {
      return isMobileView()
        ? MOBILE_FEATURE_PADDING
        : DESKTOP_FEATURE_PADDING;
    }

    function shouldShowOverlay() {
      return SHOW_OVERLAY || EDITOR_MODE;
    }


    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    /* ==========================================================
       Zone Styling
       ========================================================== */

    function getZoneStyle(isSelected = false) {

      if (shouldShowOverlay()) {
        return {
          fill: isSelected
            ? "var(--selected-fill)"
            : "var(--overlay-fill)",

          stroke: isSelected
            ? "var(--selected-stroke)"
            : "var(--overlay-stroke)",

          strokeWidth: isSelected ? "2" : "1"
        };
      }

      return {
        fill: "transparent",
        stroke: "transparent",
        strokeWidth: "0"
      };
    }

    function applyZoneStyle(group, isSelected = false) {

      const rect = group.querySelector(".zone");
      const handle = group.querySelector(".resize-handle");
      const label = group.querySelector(".zone-label");

      const style = getZoneStyle(isSelected);

      rect.setAttribute("fill", style.fill);
      rect.setAttribute("stroke", style.stroke);
      rect.setAttribute("stroke-width", style.strokeWidth);

      group.classList.toggle("selected", isSelected);
      group.classList.toggle("editor", EDITOR_MODE);

      if (handle) {
        handle.style.display = EDITOR_MODE ? "block" : "none";
      }

      if (label) {
        label.style.display = EDITOR_MODE ? "block" : "none";
      }
    }

    /* ==========================================================
       Modal
       ========================================================== */


    function renderModal(zone) {
      modalTitle.textContent = `${zone.id} — ${zone.title}`;
      modalSubtitle.textContent = `${zone.section} • ${zone.status}`;
    
      const details = [];
    
      if (zone.description) {
        details.push({
          label: "Description",
          value: escapeHtml(zone.description)
        });
      }
    
      if (zone.contact) {
        details.push({
          label: "Contact",
          value: escapeHtml(zone.contact)
        });
      }
    
      if (zone.link) {
        details.push({
          label: "Link",
          value: `<a href="${escapeHtml(zone.link)}" target="_blank" rel="noopener" style="color:#ffffff;">Open related link</a>`
        });
      }
    
      modalBody.innerHTML = `
        <ul class="detail-list">
          ${details.map(item => `
            <li class="detail-item">
              <span class="detail-label">${item.label}</span>
              <div class="detail-value">${item.value}</div>
            </li>
          `).join("")}
        </ul>
      `;
    }


    function openModal() {
      modalSheet.classList.add("open");
      modalSheet.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modalSheet.classList.remove("open");
      modalSheet.setAttribute("aria-hidden", "true");
    }

    /* ==========================================================
       Selection
       ========================================================== */

    function selectZone(id, openDetails = true) {

      const zone = zones.get(id);

      if (!zone) return;

      currentSelection = id;

      svg.querySelectorAll(".zone-group")
        .forEach(group => {

          applyZoneStyle(
            group,
            group.dataset.id === id
          );
        });

      jumpMenu.value = id;

      statusBar.textContent = EDITOR_MODE
        ? `Selected ${zone.id}`
        : `Selected ${zone.id} — ${zone.title}`;

      if (openDetails) {
        renderModal(zone);
        openModal();
      }
    }

    /* ==========================================================
       Demo Zones
       ========================================================== */

function buildZones() {

  zones.clear();

  const layout = {
    A: { x: 510, y: 550, w: 55, h: 34, rows: 18 },
    B: { x: 680, y: 620, w: 56, h: 34, rows: 16 },
    C: { x: 740, y: 550, w: 56, h: 34, rows: 18 },
    D: { x: 910, y: 550, w: 56, h: 34, rows: 18 }
  };

  const pad = 2;

  // -------- Booths --------
  ["A","B","C","D"].forEach(section => {

    const s = layout[section];

    for (let i = 0; i < s.rows; i++) {

      const num = s.rows - i;
      const id = section + num;

      zones.set(id, {
        id,
        title: id,
        section,
        description: `Booth ${id}`,
        status: "Open",
        coords: {
          x: s.x - pad,
          y: (s.y + (i * s.h)) - pad,
          w: s.w + (pad * 2),
          h: s.h + (pad * 2)
        }
      });
    }
  });

  // -------- Features --------
  zones.set("REGISTRATION", {
    id: "REGISTRATION",
    title: "Registration",
    section: "North Entrance",
    description: "Main check-in area.",
    status: "Feature",
    coords: { x: 589, y: 145, w: 296, h: 101 }
  });

  zones.set("FIRST_AID", {
    id: "FIRST_AID",
    title: "First Aid",
    section: "Northwest",
    description: "Medical support area.",
    status: "Feature",
    coords: { x: 451, y: 154, w: 90, h: 87 }
  });

  zones.set("EVENT_STAGE", {
    id: "EVENT_STAGE",
    title: "Event Stage",
    section: "South Center",
    description: "Main stage area.",
    status: "Feature",
    coords: { x: 606, y: 1456, w: 451, h: 362 }
  });

  zones.set("RESTROOM_NORTH", {
    id: "RESTROOM_NORTH",
    title: "Restrooms (North)",
    section: "Northeast",
    description: "North restroom area.",
    status: "Feature",
    coords: { x: 906, y: 150, w: 115, h: 94 }
  });

  zones.set("RESTROOM_SOUTH", {
    id: "RESTROOM_SOUTH",
    title: "Restrooms (South)",
    section: "South Entrance",
    description: "South restroom area.",
    status: "Feature",
    coords: { x: 757, y: 1831, w: 110, h: 110 }
  });
}

    /* ==========================================================
       Drawing
       ========================================================== */

    function updateGroupGeometry(group, zone) {

      const rect = group.querySelector(".zone");

      rect.setAttribute("x", zone.coords.x);
      rect.setAttribute("y", zone.coords.y);

      rect.setAttribute("width", zone.coords.w);
      rect.setAttribute("height", zone.coords.h);
    }

    function drawZones() {

      svg.innerHTML = "";

      zones.forEach((zone) => {

        const group =
          document.createElementNS(
            "http://www.w3.org/2000/svg",
            "g"
          );

        group.setAttribute("class", "zone-group");
        group.dataset.id = zone.id;

        const rect =
          document.createElementNS(
            "http://www.w3.org/2000/svg",
            "rect"
          );

        rect.setAttribute("class", "zone");
        rect.setAttribute("rx", "3");
        rect.setAttribute("ry", "3");

        group.appendChild(rect);

        svg.appendChild(group);

        updateGroupGeometry(group, zone);

        applyZoneStyle(group, false);

        group.addEventListener("click", (e) => {

          e.preventDefault();
          e.stopPropagation();

          selectZone(zone.id, true);
        });
      });
    }

    /* ==========================================================
       Search
       ========================================================== */

    function searchZones(query) {

      const q =
        (query || "")
          .toLowerCase()
          .trim();

      if (!q) {

        svg.querySelectorAll(".zone-group")
          .forEach(group => {
            group.style.opacity = "1";
          });

        return;
      }

      zones.forEach((zone, id) => {

        const group =
          svg.querySelector(
            `.zone-group[data-id="${CSS.escape(id)}"]`
          );

        const haystack = [
          zone.id,
          zone.title,
          zone.section,
          zone.description
        ]
          .join(" ")
          .toLowerCase();

        const match = haystack.includes(q);

        if (group) {
          group.style.opacity = match ? "1" : "0.08";
        }
      });
    }

    /* ==========================================================
       Init
       ========================================================== */

    function init() {

      buildZones();

      drawZones();

      searchBox.addEventListener("input", (e) => {
        searchZones(e.target.value);
      });

      closeModalBtn.addEventListener("click", closeModal);

      statusBar.textContent =
        "Tap a booth or feature to open details.";

      if (!EDITOR_MODE) {
        copyLayoutBtn.style.display = "none";
        clearBtn.style.display = "none";
      }
    }

    init();
  </script>
</body>
</html>
```
