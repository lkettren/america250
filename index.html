<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>America250 Map</title>

<style>
:root {
  --bg: #012249;
  --text: #ffffff;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
}

/* MAP AREA */
.map-container {
  position: relative;
}

.map-wrapper {
  position: relative;
}

.map-wrapper img {
  width: 100%;
}

/* SVG overlay */
svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.zone {
  cursor: pointer;
}

/* TOOLBAR */
.toolbar {
  padding: 10px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select {
  background: #012249;
  color: white;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 10px;
  flex: 1;
}

/* ✅ MODAL BACKDROP */
.modal-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 100;
}

/* ✅ MODAL PANEL */
.modal {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: #012249;
  padding: 20px;
  border-radius: 15px 15px 0 0;
  transition: bottom 0.3s ease;
  z-index: 200;
}

.modal.open {
  bottom: 0;
}

.modal h2 {
  margin-top: 0;
}

/* ✅ CLOSE BAR */
.drag-bar {
  width: 50px;
  height: 5px;
  background: rgba(255,255,255,0.5);
  border-radius: 5px;
  margin: 0 auto 10px auto;
}

</style>
</head>

<body>

<!-- MAP -->
<div class="map-container">

  <div class="toolbar">
    <input id="search" placeholder="Search booth..." />
    <select id="jump">
      <option value="">Jump to booth</option>
    </select>
  </div>

  <div class="map-wrapper">
    <img src="floorplan.png">
    <svg id="overlay" viewBox="0 0 1544 2000"></svg>
  </div>

</div>

<!-- MODAL BACKDROP -->
<div id="backdrop" class="modal-backdrop" onclick="closeModal()"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="drag-bar"></div>
  <h2 id="title">Booth</h2>
  <div id="content">Details</div>
</div>

<script>

/* ✅ TOGGLE */
const SHOW_OVERLAY = false;

/* LAYOUT */
const layout = {
  A: { x: 510, y: 550, w: 55, h: 34, rows: 18 },
  B: { x: 680, y: 620, w: 56, h: 34, rows: 16 },
  C: { x: 740, y: 550, w: 56, h: 34, rows: 18 },
  D: { x: 910, y: 550, w: 56, h: 34, rows: 18 }
};

const svg = document.getElementById("overlay");
let zones = {};

/* STYLE CONTROL */
function applyStyle(rect) {
  if (SHOW_OVERLAY) {
    rect.setAttribute("fill", "rgba(255,255,255,0.2)");
    rect.setAttribute("stroke", "#ffffff");
  } else {
    rect.setAttribute("fill", "transparent");
    rect.setAttribute("stroke", "transparent");
  }
}

/* GENERATE BOOTHS */
function generate(section) {
  let s = layout[section];

  for (let i = 0; i < s.rows; i++) {

    let num = s.rows - i;
    let id = section + num;

    let rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

    rect.setAttribute("x", s.x);
    rect.setAttribute("y", s.y + (i * s.h));
    rect.setAttribute("width", s.w);
    rect.setAttribute("height", s.h);

    applyStyle(rect);

    rect.dataset.id = id;
    rect.onclick = () => openModal(id);

    svg.appendChild(rect);

    zones[id] = {
      title: id,
      desc: "Assign this booth"
    };
  }
}

["A","B","C","D"].forEach(generate);

/* SAMPLE DATA */
Object.assign(zones, {
  REGISTRATION: { title: "Registration", desc: "Check-in area" },
  VIP: { title: "VIP Area", desc: "Reserved seating" }
});

/* ✅ MODAL CONTROL */
function openModal(id) {
  let data = zones[id] || { title: id, desc: "No data" };

  document.getElementById("title").innerText = data.title;
  document.getElementById("content").innerText = data.desc;

  document.getElementById("modal").classList.add("open");
  document.getElementById("backdrop").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.getElementById("backdrop").style.display = "none";
}

/* ✅ SEARCH */
document.getElementById("search").oninput = (e) => {
  let val = e.target.value.toLowerCase();

  document.querySelectorAll("#overlay rect").forEach(r => {
    let id = r.dataset.id;
    let match = id.toLowerCase().includes(val);

    r.style.opacity = match || !val ? 1 : 0.1;
  });
};

/* ✅ JUMP */
let jump = document.getElementById("jump");

Object.keys(zones).sort().forEach(id => {
  let opt = document.createElement("option");
  opt.value = id;
  opt.textContent = id;
  jump.appendChild(opt);
});

jump.onchange = () => {
  if (jump.value) openModal(jump.value);
};

</script>

</body>
</html>
``
